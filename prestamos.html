<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Préstamos</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="app-nav">
    <a href="dashboard.html" class="app-nav__brand">Finanzas</a>
    <div class="app-nav__links">
      <a href="dashboard.html">Cuentas</a>
      <a href="pagos.html">Pagos</a>
      <a href="hormiga.html">Hormiga</a>
      <a href="prestamos.html" class="active">Préstamos</a>
      <a href="resumen.html">Resumen</a>
    </div>
    <span class="app-nav__user" id="user-label"></span>
    <div class="app-nav__actions">
      <button type="button" class="btn btn--ghost btn--sm" id="btn-logout">Salir</button>
    </div>
  </nav>

  <div id="alerta-pagos-semana" class="alerta-pagos-semana" hidden></div>

  <main class="app-main">
    <header class="page-header page-header__row">
      <div>
        <h1>Préstamos</h1>
        <p>Registra los préstamos que realizas.</p>
      </div>
      <button type="button" class="btn btn--primary" id="btn-nuevo-prestamo">+ Nuevo préstamo</button>
    </header>

    <div id="prestamos-indicadores" class="prestamos-indicadores" hidden>
      <article class="prestamos-indicador">
        <span class="prestamos-indicador__label">Préstamos</span>
        <span class="prestamos-indicador__valor" id="ind-prestamos-cantidad">0</span>
        <span class="prestamos-indicador__det" id="ind-prestamos-activos"></span>
      </article>
      <article class="prestamos-indicador">
        <span class="prestamos-indicador__label">Capital prestado</span>
        <span class="prestamos-indicador__valor" id="ind-prestamos-capital">0</span>
      </article>
      <article class="prestamos-indicador">
        <span class="prestamos-indicador__label">Total con intereses</span>
        <span class="prestamos-indicador__valor" id="ind-prestamos-total">0</span>
      </article>
      <article class="prestamos-indicador prestamos-indicador--destacado">
        <span class="prestamos-indicador__label">Pendiente por cobrar</span>
        <span class="prestamos-indicador__valor" id="ind-prestamos-pendiente">0</span>
      </article>
    </div>

    <div id="empty-prestamos" class="empty-state" hidden>
      <strong>No hay préstamos</strong>
      <p>Pulsa «Nuevo préstamo» para registrar el primero.</p>
    </div>

    <ul id="lista-prestamos" class="cuentas-list prestamos-list" hidden></ul>
  </main>

  <div id="modal-prestamo" class="modal" aria-hidden="true" role="dialog" aria-labelledby="modal-prestamo-titulo">
    <div class="modal__backdrop" data-close></div>
    <div class="modal__dialog">
      <div class="modal__header">
        <h2 id="modal-prestamo-titulo">Nuevo préstamo</h2>
        <button type="button" class="modal__close" data-close aria-label="Cerrar">&times;</button>
      </div>
      <form id="form-prestamo">
        <div class="form-group">
          <label for="prestamo-prestante">Prestante</label>
          <input type="text" id="prestamo-prestante" required placeholder="Nombre de quien recibe el préstamo">
        </div>
        <div class="form-group">
          <label for="prestamo-monto">Monto</label>
          <input type="number" id="prestamo-monto" min="0" step="0.01" required placeholder="0">
        </div>
        <div class="form-group">
          <label for="prestamo-intereses">Intereses (%)</label>
          <input type="number" id="prestamo-intereses" min="0" step="0.01" value="0" placeholder="0">
        </div>
        <div class="form-group">
          <label for="prestamo-vencimiento">Fecha de vencimiento</label>
          <input type="date" id="prestamo-vencimiento" required>
        </div>
        <div class="form-group">
          <label for="prestamo-cuotas">Cuotas</label>
          <input type="number" id="prestamo-cuotas" min="1" max="360" value="1" required>
        </div>
        <div class="form-group" id="field-cuotas-pagadas" hidden>
          <label for="prestamo-cuotas-pagadas">Cuotas pagadas</label>
          <input type="number" id="prestamo-cuotas-pagadas" min="0" value="0">
        </div>
        <div class="modal__footer">
          <button type="button" class="btn btn--ghost" data-close>Cancelar</button>
          <button type="submit" class="btn btn--primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/alertas.js"></script>
  <script src="js/prestamos-page.js"></script>
</body>
</html>
